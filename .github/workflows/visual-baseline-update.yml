name: Visual Baseline Update (Maintainer)

on:
  workflow_dispatch:

jobs:
  update-visual-baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:visual:update
