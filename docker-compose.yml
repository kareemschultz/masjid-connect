services:
  # ── PostgreSQL 16 ──────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-masjidconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-masjidconnect_secret}
      POSTGRES_DB: ${POSTGRES_DB:-masjidconnect}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-masjidconnect} -d ${POSTGRES_DB:-masjidconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Next.js Application ────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-masjidconnect}:${POSTGRES_PASSWORD:-masjidconnect_secret}@db:5432/${POSTGRES_DB:-masjidconnect}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
